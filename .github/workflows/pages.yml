name: Publicar GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # Antes estava como "false": se uma execução anterior ficasse travada (ex:
  # repo grande demais, runner lento), TODOS os pushes seguintes ficavam
  # enfileirados esperando ela terminar - e nunca terminava. Com "true", um
  # push novo cancela a execução anterior em andamento e assume na hora -
  # sempre publica o orçamento mais recente, em vez de empilhar a fila.
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # Limite de segurança: se algo travar (ex: repo gigante, runner lento),
    # essa execução é encerrada sozinha em 5 minutos em vez de ficar presa
    # indefinidamente e atrapalhar os próximos envios.
    timeout-minutes: 5
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          # Sem isso, o GitHub baixa TODO o histórico de commits do repo a
          # cada deploy - e como esse repositório acumula cada orçamento
          # publicado desde o início (vários MB cada), o histórico fica
          # pesado e o checkout sozinho pode demorar minutos. Com
          # fetch-depth: 1, só baixa o snapshot atual dos arquivos, sem
          # história - muito mais rápido, e não precisamos do histórico
          # pra publicar o site.
          fetch-depth: 1

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar o site (raiz do repositório, sem processar Jekyll)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
